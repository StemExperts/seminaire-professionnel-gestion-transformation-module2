<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Résultats – La Pertinence du Changement</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --ink:         #002169;
  --ink-soft:    #1d71b8;
  --cream:       #f5f7fa;
  --cream-dark:  #e8ecf2;
  --gold:        #ffed00;
  --gold-light:  #fff176;
  --gold-bg:     #fffde7;
  --blue:        #1d71b8;
  --blue-light:  #d0e4f5;
  --teal:        #0090ac;
  --teal-light:  #d0eef3;
  --green:       #95c11f;
  --green-light: #e8f5c0;
  --red:         #c0392b;
  --orange:      #e8a020;
  --white:       #ffffff;
  --shadow:      0 4px 28px rgba(0,33,105,0.10);
  --shadow-lg:   0 10px 48px rgba(0,33,105,0.18);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--cream);
  font-family: 'DM Sans', sans-serif;
  color: var(--ink);
  min-height: 100vh;
}
body::before {
  content: '';
  position: fixed; top: -180px; right: -180px;
  width: 520px; height: 520px; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,237,0,0.07) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}
.page {
  max-width: 860px;
  margin: 0 auto;
  padding: 48px 20px 80px;
  position: relative; z-index: 1;
}

/* ── Header ──────────────────────────────────────────────── */
.header {
  text-align: center;
  margin-bottom: 44px;
  animation: fadeUp .65s ease both;
}
.eyebrow {
  font-size: 10px; letter-spacing: .2em; text-transform: uppercase;
  color: var(--ink-soft); font-weight: 600; margin-bottom: 12px;
  display: block;
}
.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(24px,5vw,40px); font-weight: 700;
  line-height: 1.2; margin-bottom: 10px;
}
.participant-line {
  font-size: 21px; color: var(--ink-soft);
  margin-top: 6px;
}
.participant-line strong { color: var(--blue); font-weight: 600; }
.divider {
  width: 52px; height: 3px;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  margin: 18px auto 0; border-radius: 2px;
}

/* ── Summary cards ────────────────────────────────────────── */
.summary-row {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 320px));
  gap: 14px; margin-bottom: 24px;
  animation: fadeUp .65s .1s ease both;
  justify-content: center;
}
@media(max-width:600px){ .summary-row { grid-template-columns: 1fr; } }

.summary-card {
  background: var(--white);
  border-radius: 14px; padding: 24px 18px 20px;
  box-shadow: var(--shadow); text-align: center;
  position: relative; overflow: hidden;
  transition: transform .2s, box-shadow .2s;
}
.summary-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
.summary-card::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 4px;
}
.summary-card.v-card::before    { background: linear-gradient(90deg, var(--blue), #4a90d9); }
.summary-card.ao-card::before   { background: linear-gradient(90deg, var(--teal), #00b8d4); }
.summary-card.p-card::before    { background: linear-gradient(90deg, var(--ink), var(--blue)); }

.sc-label {
  font-size: 10px; letter-spacing: .15em; text-transform: uppercase;
  font-weight: 600; margin-bottom: 10px;
  color: var(--ink-soft);
}
.sc-score {
  font-family: 'Playfair Display', serif;
  font-size: 42px; font-weight: 700; line-height: 1;
}
.sc-denom { font-size: 14px; color: #777; margin-left: 2px; }
.sc-sub { font-size: 12px; color: #888; margin-top: 4px; }


/* ── Geometric mean and comparison charts ─────────────────── */
.gm-card {
  background: var(--ink);
  border-radius: 16px; padding: 28px 24px;
  box-shadow: var(--shadow-lg);
  display: flex; align-items: center; gap: 24px;
  margin-bottom: 20px;
  animation: fadeUp .65s .14s ease both;
}
@media(max-width:620px){ .gm-card { flex-direction: column; text-align: center; } }

.gm-icon {
  flex-shrink: 0; width: 58px; height: 58px; border-radius: 50%;
  background: rgba(255,237,0,.12);
  border: 1.5px solid rgba(255,237,0,.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; color: var(--gold-light);
}
.gm-text h3 {
  font-family: 'Playfair Display', serif;
  font-size: 17px; color: var(--white); margin-bottom: 5px;
}
.gm-text p {
  font-size: 12px; color: rgba(255,255,255,.74);
  line-height: 1.55; max-width: 420px;
}
.gm-scores { margin-left: auto; flex-shrink: 0; display: flex; gap: 24px; }
@media(max-width:620px){ .gm-scores { margin-left: 0; } }
.gm-score-block { text-align: center; }
.gm-score-num {
  font-family: 'Playfair Display', serif;
  font-size: 34px; font-weight: 700; color: var(--gold-light); line-height: 1;
}
.gm-score-lbl {
  font-size: 9px; letter-spacing: .13em; text-transform: uppercase;
  color: rgba(255,255,255,.55); margin-top: 4px;
}
.gm-divider { width: 1px; background: rgba(255,255,255,.12); align-self: stretch; }

.gm-chart-card {
  background: var(--white); border-radius: 16px; padding: 28px 24px;
  box-shadow: var(--shadow); margin-bottom: 24px;
  animation: fadeUp .65s .16s ease both;
}
.gm-chart-title {
  font-family: 'Playfair Display', serif; font-size: 19px; margin-bottom: 4px;
}
.gm-chart-sub { font-size: 12px; color: var(--ink-soft); margin-bottom: 24px; }
.gm-chart-grid { display: grid; grid-template-columns: 3fr 2fr; gap: 24px; }
@media(max-width:700px){ .gm-chart-grid { grid-template-columns: 1fr; } }
.gm-chart-label {
  font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
  font-weight: 600; color: var(--ink-soft); text-align: center; margin-bottom: 10px;
}
.gm-legend { display:flex; justify-content:center; gap:20px; flex-wrap:wrap; margin-top:12px; font-size:11px; color:#4a5a8a; }
.gm-legend-group { display:flex; align-items:center; gap:6px; }
.gm-legend-swatch { display:inline-block; width:12px; height:12px; border-radius:3px; }
.gm-donut-stack { display:flex; flex-direction:column; gap:20px; align-items:center; }
.gm-donut-wrap { display:flex; flex-direction:column; align-items:center; gap:6px; }
.gm-donut-rel { position:relative; width:150px; height:150px; }
.gm-donut-center {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  text-align:center; pointer-events:none;
}
.gm-donut-center .big {
  font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; line-height:1;
}
.gm-donut-center .sm { font-size:11px; color: var(--ink-soft); }
.gm-donut-block-lbl {
  font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
  font-weight: 600; color: var(--ink-soft); text-align: center; margin-top: 4px;
}

/* ── Potential block ──────────────────────────────────────── */
.potential-wrap {
  background: var(--ink);
  border-radius: 16px; padding: 32px 28px;
  box-shadow: var(--shadow-lg);
  margin-bottom: 24px;
  position: relative; overflow: hidden;
  animation: fadeUp .65s .18s ease both;
}
.potential-wrap::before {
  content: ''; position: absolute;
  right: -60px; top: -60px;
  width: 240px; height: 240px; border-radius: 50%;
  border: 50px solid rgba(255,237,0,0.07);
}
.potential-wrap::after {
  content: ''; position: absolute;
  right: 60px; bottom: -80px;
  width: 180px; height: 180px; border-radius: 50%;
  border: 30px solid rgba(255,255,255,0.04);
}
.pot-eyebrow {
  font-size: 10px; letter-spacing: .2em; text-transform: uppercase;
  color: var(--gold); font-weight: 600; margin-bottom: 10px;
}
.pot-level {
  font-family: 'Playfair Display', serif;
  font-size: clamp(24px,4vw,34px); font-weight: 700;
  color: var(--white); margin-bottom: 20px; line-height: 1.2;
}
.pot-divider {
  width: 40px; height: 3px; background: var(--gold);
  border-radius: 2px; margin-bottom: 20px;
}
.pot-bullets {
  list-style: none; display: flex; flex-direction: column; gap: 9px;
  position: relative; z-index: 1;
}
.pot-bullets li {
  display: flex; align-items: flex-start; gap: 10px;

}
.pot-bullets li::before {
  content: '→'; color: var(--gold); font-weight: 700;
  flex-shrink: 0; margin-top: 1px;
}

/* ── Matrix ───────────────────────────────────────────────── */
.matrix-wrap {
  background: var(--white);
  border-radius: 16px; padding: 28px 24px;
  box-shadow: var(--shadow);
  margin-bottom: 24px;
  animation: fadeUp .65s .25s ease both;
}
.section-title {
  font-family: 'Playfair Display', serif;
  font-size: 18px; font-weight: 700; margin-bottom: 20px;
}
/* Matrix axis labels */
.matrix-axis-title {
  font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
  color: var(--ink-soft); margin-bottom: 8px;
}
.matrix-axis-title span {
  background: var(--ink); color: var(--white);
  padding: 3px 10px; border-radius: 20px; font-size: 10px;
}
.mgrid {
  display: grid;
  grid-template-columns: 140px repeat(3,1fr);
  gap: 6px;
}
.mh {
  background: var(--ink); color: var(--white);
  font-size: 11px; font-weight: 600; text-align: center;
  padding: 10px 8px; border-radius: 8px; line-height: 1.4;
}
.mh .mh-range {
  display: block; font-size: 13px; font-weight: 700;

}
.mh .mh-label { display: block; font-size: 9px; opacity: 0.7; letter-spacing: .05em; }
.mh.blank { background: transparent; }
.mao {
  background: var(--ink); color: var(--white);
  font-size: 11px; font-weight: 600;
  padding: 10px 8px; border-radius: 8px;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; text-align: center; line-height: 1.4; gap: 2px;
}
.mao .mao-range {
  font-family: inherit;
  font-size: 11px; font-weight: 400; opacity: 0.75;
}
.mao .mao-label { display:block; font-size: 11px; font-weight:700; opacity:1; letter-spacing:0; }
.mc {
  border-radius: 8px; padding: 14px 10px;
  text-align: center; font-size: 12px; font-weight: 600;
  min-height: 72px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px;
  color: white; opacity: 0.28; transition: transform .2s, box-shadow .2s;
}
.mc.active {
  opacity: 1; transform: scale(1.05);
  box-shadow: 0 0 0 3px var(--gold), 0 8px 24px rgba(0,0,0,0.2);
  z-index: 2; position: relative;
}
.mc .mc-star { font-size: 16px; }
.mc .mc-name { font-size: 11px; font-weight: 700; line-height: 1.3; }
.c-el  { background: #95c11f; }
.c-ae  { background: #95c11f; }
.c-mo  { background: #ffed00; }
.c-fa  { background: #922b21; }
.c-tf  { background: #922b21; }

/* Matrix legend */
.matrix-legend {
  display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px;
}
.ml-item {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--ink);
}
.ml-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}

/* ── Formula note ─────────────────────────────────────────── */
.formula-note {
  background: var(--blue-light);
  border-left: 4px solid var(--blue);
  border-radius: 0 10px 10px 0;
  padding: 14px 18px; margin-bottom: 24px;
  font-size: 13px; color: var(--ink); line-height: 1.7;
  animation: fadeUp .65s .28s ease both;
}
.formula-note strong { font-family: 'Playfair Display', serif; font-size: 15px; }

/* ── Detail sections ──────────────────────────────────────── */
.sections-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px; margin-bottom: 24px;
  animation: fadeUp .65s .32s ease both;
}
@media(max-width:640px){ .sections-grid { grid-template-columns: 1fr; } }

.section-card {
  background: var(--white);
  border-radius: 14px; padding: 22px 20px 20px;
  box-shadow: var(--shadow);
  position: relative; overflow: hidden;
  transition: transform .2s;
}
.section-card:hover { transform: translateY(-2px); }
.section-card::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 4px;
}
.sc-v::before  { background: linear-gradient(90deg,var(--blue),#4a90d9); }
.sc-ao::before { background: linear-gradient(90deg,var(--teal),#00b8d4); }

.sc-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 16px;
}
.sc-name {
  font-family: 'Playfair Display', serif;
  font-size: 14px; font-weight: 700; line-height: 1.3; flex: 1;
}
.sc-badge {
  font-family: 'Playfair Display', serif;
  font-size: 22px; font-weight: 700; white-space: nowrap; margin-left: 12px;
}
.sc-denom-sm { font-size: 12px; color: #888; }

.q-row { margin-bottom: 11px; }
.q-label {
  display: flex; justify-content: space-between;
  font-size: 11px; color: #555; margin-bottom: 4px; line-height: 1.4;
}
.q-label .q-val { font-weight: 700; color: var(--ink); white-space: nowrap; margin-left: 8px; }
.q-label .q-inv { color: var(--teal); font-size: 10px; }
.bar-track {
  height: 7px; background: var(--cream-dark);
  border-radius: 4px; overflow: hidden;
}
.bar-fill {
  height: 100%; border-radius: 4px;
  transition: width 1s ease;
}

/* ── Score table ──────────────────────────────────────────── */
.table-wrap {
  background: var(--white);
  border-radius: 16px; padding: 28px 24px;
  box-shadow: var(--shadow);
  margin-bottom: 24px;
  animation: fadeUp .65s .38s ease both;
  overflow-x: auto;
}
.table-title {
  font-family: 'Playfair Display', serif;
  font-size: 18px; font-weight: 700; margin-bottom: 16px;
}
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th {
  text-align: left; padding: 8px 12px;
  background: var(--cream); font-weight: 600;
  font-size: 11px; letter-spacing: .05em; text-transform: uppercase;
  color: var(--ink-soft);
}
td {
  padding: 10px 12px; border-bottom: 1px solid var(--cream-dark);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
.td-score { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; }
.td-bar { width: 100px; }
.td-inv { font-size: 10px; color: var(--teal); font-weight: 600; }
.total-row td { background: var(--cream-dark); font-weight: 700; }

/* ── Footer ───────────────────────────────────────────────── */
.footer {
  text-align: center; font-size: 11px; color: #aaa;
  margin-top: 48px; animation: fadeUp .65s .5s ease both;
}

/* ── Error ────────────────────────────────────────────────── */
.error-wrap {
  text-align: center; padding: 80px 20px;
}
.error-wrap h2 {
  font-family: 'Playfair Display', serif; font-size: 1.4rem; margin-bottom: 12px;
}
.error-wrap p { color: #777; font-size: 14px; line-height: 1.7; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>

<div class="page" id="page"></div>

<script>
// ── CSV URL (same as dashboard) ───────────────────────────────────────────────
const BASE_ZOHO_URL = 'https://sheet.zohopublic.com/sheet/published/k9dlp18691e0ce0944a07af1f2ae69379be4c?download=csv&sheetname=Feuille1';
const CSV_SOURCES = [
  url => 'https://corsproxy.io/?url=' + encodeURIComponent(url),
  url => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
  url => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url),
  url => 'https://thingproxy.freeboard.io/fetch/' + url
];

// ── MATRIX DATA ────────────────────────────────────────────────────────────────
const MX = {
  '23-30': {
    '36-50': { l:'Potentiel élevé',       c:'c-el', b:['Il est nécessaire et pertinent d\'agir maintenant','Ne pas le faire pourrait mettre l\'organisation en péril','Les conditions semblent réunies pour réussir','Il est approprié de s\'y mettre dès maintenant','Procéder assez rapidement pour profiter de la fenêtre d\'opportunité'] },
    '20-35': { l:'Potentiel modéré',       c:'c-mo', b:['Les conditions semblent réunies','L\'objet de changement pourrait se faire déclasser par d\'autres priorités','Procéder assez rapidement','Mobiliser le personnel en attirant l\'attention sur les éléments qui justifient le changement'] },
    '5-19':  { l:'Potentiel faible',       c:'c-fa', b:['L\'effort risque de s\'essouffler rapidement','L\'objet de changement n\'est pas suffisamment problématique pour le personnel concerné','Attendre qu\'il devienne problématique','Ou soulever les dangers potentiels dans le futur'] }
  },
  '14-22': {
    '36-50': { l:'Potentiel assez élevé',  c:'c-ae', b:['Souhaitable d\'agir maintenant','Conditions internes plutôt favorables','Utile de s\'assurer que les ressources et le temps requis y sont véritablement consacrés et de façon soutenue'] },
    '20-35': { l:'Potentiel modéré',       c:'c-mo', b:['Possible d\'agir mais avec prudence','La situation justifie un effort','Conditions internes plutôt favorables','Se montrer prudent','Démontrer que l\'envergure n\'est pas démesurée','Veiller à ce que les ressources y soient vraiment consacrées sans être récupérées pour d\'autres priorités'] },
    '5-19':  { l:'Potentiel très faible',  c:'c-tf', b:['Probabilités de succès faibles','Pas suffisamment problématique','Conditions internes modérément favorables','Hasardeux','Attendre que la situation devienne plus problématique ou mettre en relief les dangers du statu quo','Veiller à ce que les ressources y soient vraiment consacrées sans être récupérées pour d\'autres priorités'] }
  },
  '6-13': {
    '36-50': { l:'Potentiel modéré',       c:'c-mo', b:['Nécessaire d\'agir','Conditions internes constituent un frein','Les ressources et le temps non disponibles','Examiner le fonctionnement pour dégager les ressources nécessaires pour ne pas surcharger l\'organisation et éparpiller les énergies'] },
    '20-35': { l:'Potentiel faible',       c:'c-fa', b:['Probabilités de succès faibles','Problématiques suffisamment importantes mais les conditions internes ne sont pas favorables','Mettre en relief les lacunes de la situation actuelle et les dangers du statu quo','Dégager temps et ressources en veillant à ce que d\'autres priorités ne viennent pas les détourner'] },
    '5-19':  { l:'Potentiel très faible',  c:'c-tf', b:['Risque élevé','Attendre que la situation devienne problématique et que les conditions internes permettent de dégager temps et ressources nécessaires'] }
  }
};

const V_Q = [
  {lbl:'…pose-t-elle des problèmes à la clientèle concernée ?',     max:20},
  {lbl:'…pose-t-elle des problèmes de fonctionnement au personnel ?',max:10},
  {lbl:'…pourrait-elle se dégrader si le changement n\'est pas introduit maintenant ?', max:10},
  {lbl:'…pose-t-elle des problèmes à vos partenaires ou à vos pairs ?', max:5},
  {lbl:'…pose-t-elle des problèmes à vos supérieurs hiérarchiques ?',   max:5},
];
const AO_Q = [
  {lbl:'Votre organisation est-elle aux prises avec d\'autres problèmes qui exigent plus d\'énergie ?', max:5},
  {lbl:'Le temps consacré à ce dossier pourrait-il compromettre d\'autres dossiers prioritaires ?',      max:5},
  {lbl:'Disposez-vous du temps requis pour prendre en charge la gestion de ce dossier ?',                max:5},
  {lbl:'Le changement épouse-t-il les orientations explicites de votre organisation ?',                  max:5},
  {lbl:'Le financement requis pour réaliser ce changement est-il disponible ?',                          max:5},
  {lbl:'Les solutions envisagées seront-elles plus efficaces que la formule actuelle ?',                 max:5},
];

// ── TEXT → SCORE CONVERSION ───────────────────────────────────────────────────
const SCALE_POS = { 'Pas du tout': 1, 'Peu': 2, 'Moyennement': 3, 'Passablement': 4, 'Beaucoup': 5 };
const V_MULT = [4, 2, 2, 1, 1]; // Weighted multipliers per V question
const AO_INV = [true, true, false, false, false, false]; // Q1, Q2 are inverted

function textToVScore(text, qi) {
  const pos = SCALE_POS[text] || 0;
  return pos * V_MULT[qi];
}
function textToAOScore(text, qi) {
  const pos = SCALE_POS[text] || 0;
  return AO_INV[qi] ? (6 - pos) : pos;
}

// (Column names are now found dynamically in processRow via flexible matching)

// ── HELPERS ───────────────────────────────────────────────────────────────────
function gV(v)  { return v>=36?'36-50':v>=20?'20-35':'5-19'; }
function gAO(a) { return a>=23?'23-30':a>=14?'14-22':'6-13'; }

function barColor(pct) {
  if (pct >= 70) return 'var(--blue)';
  if (pct >= 45) return 'var(--orange)';
  return 'var(--red)';
}

function round1(n) {
  return Math.round(Number(n || 0) * 10) / 10;
}

function geometricMeanPercent(scores, maxima) {
  const parts = scores.map((score, i) => {
    const max = Number(maxima[i] || 0);
    if (!max) return 0.01;
    const ratio = Number(score || 0) / max;
    return Math.max(0.01, ratio);
  });
  const product = parts.reduce((acc, val) => acc * val, 1);
  return round1(Math.pow(product, 1 / parts.length) * 100);
}

function buildComparisonMetrics(d) {
  const vMaxes = V_Q.map(q => q.max);
  const aoMaxes = AO_Q.map(q => q.max);
  const arithmeticV = round1((d.vScore / 50) * 100);
  const arithmeticAO = round1((d.aoScore / 30) * 100);
  const arithmeticGlobal = round1(((d.vScore + d.aoScore) / 80) * 100);
  const geoV = geometricMeanPercent(d.vQuestions, vMaxes);
  const geoAO = geometricMeanPercent(d.aoQuestions, aoMaxes);
  const geoGlobal = geometricMeanPercent([...d.vQuestions, ...d.aoQuestions], [...vMaxes, ...aoMaxes]);

  return {
    arithmeticV,
    arithmeticAO,
    arithmeticGlobal,
    geoV,
    geoAO,
    geoGlobal,
  };
}

// ── CSV PARSER (with character normalization) ─────────────────────────────────
function norm(s) {
  // Normalize curly quotes → straight, en/em dash → hyphen, strip accents
  return s.replace(/[\u2018\u2019\u2032]/g, "'").replace(/[\u2013\u2014]/g, '-').trim();
}
function normSearch(s) {
  // For searching: also strip accents
  return norm(s).normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => norm(h.replace(/^"|"$/g, '')));
  return lines.slice(1).map(line => {
    const vals = []; let cur = '', inQ = false;
    for (let c of line) {
      if (c === '"') inQ = !inQ;
      else if (c === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = vals[i] || '');
    return obj;
  });
}

// ── GET VALUE BY PARTIAL KEY MATCH ────────────────────────────────────────────
function getCol(row, searchKey) {
  const nk = norm(searchKey);
  // Try exact match first
  if (row[nk] !== undefined) return row[nk];
  // Partial match
  for (const key of Object.keys(row)) {
    if (key.includes(nk) || nk.includes(key)) return row[key];
  }
  return '';
}

// ── GET PARTICIPANT IDENTITY FROM URL ─────────────────────────────────────────
function getIdentity() {
  const p = new URLSearchParams(window.location.search);
  const pick = (...keys) => {
    for (const key of keys) {
      const val = p.get(key);
      if (val && val.trim()) return val.trim();
    }
    return '';
  };
  return {
    prenom: pick('prenom', 'Prénom', 'first_name', 'firstname'),
    nom: pick('nom', 'Nom', 'last_name', 'lastname'),
    responseId: pick('responseId', 'responseid', 'response_id', 'rid', 'ID de la réponse'),
    dateAtelier: pick('date', "Date de l'atelier", 'date_atelier', 'dateAtelier')
  };
}

function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function looksLikeValidCSV(text) {
  if (!text || text.length < 80) return false;
  const head = text.slice(0, 600).toLowerCase();
  if (head.includes('<html') || head.includes('<!doctype')) return false;
  return head.includes('prénom') || head.includes('prenom');
}

async function loadCSVText() {
  const bustUrl = BASE_ZOHO_URL + '&_t=' + Date.now();
  let lastError = null;

  for (const source of CSV_SOURCES) {
    try {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 8000);
      const res = await fetch(source(bustUrl), { cache: 'no-store', signal: controller.signal });
      clearTimeout(timer);
      if (!res.ok) continue;
      const text = await res.text();
      if (looksLikeValidCSV(text)) return text;
    } catch (e) {
      lastError = e;
    }
  }

  throw lastError || new Error('Impossible de télécharger un CSV valide');
}

// ── FIND PARTICIPANT IN CSV ───────────────────────────────────────────────────
function findParticipant(rows, identity) {
  const nl = s => normSearch(String(s || ''));
  const responseId = nl(identity.responseId);
  const prenom = nl(identity.prenom);
  const nom = nl(identity.nom);

  const extract = row => {
    const keys = Object.keys(row);
    return {
      prenom: row[keys.find(k => normSearch(k).includes('prenom')) || ''] || '',
      nom: row[keys.find(k => normSearch(k) === 'nom') || ''] || '',
      responseId: row[keys.find(k => normSearch(k).includes('id de la reponse')) || ''] || ''
    };
  };

  if (responseId) {
    const exactById = rows.find(r => nl(extract(r).responseId) === responseId);
    if (exactById) return exactById;
  }

  if (prenom && nom) {
    const exactByName = rows.find(r => {
      const e = extract(r);
      return nl(e.prenom) === prenom && nl(e.nom) === nom;
    });
    if (exactByName) return exactByName;
  }

  if (prenom && !nom) {
    const firstNameMatches = rows.filter(r => nl(extract(r).prenom) === prenom);
    if (firstNameMatches.length === 1) return firstNameMatches[0];
  }

  return null;
}

// ── PROCESS ROW → DATA OBJECT ─────────────────────────────────────────────────
function processRow(row) {
  const keys = Object.keys(row);

  // Page scores (pre-calculated by Zoho)
  const vScoreCol = keys.find(k => normSearch(k).includes('page 2') && normSearch(k).includes('score') && !normSearch(k).includes('percentage')) || '';
  const aoScoreCol = keys.find(k => normSearch(k).includes('page 3') && normSearch(k).includes('score') && !normSearch(k).includes('percentage')) || '';

  const vScore  = parseFloat(row[vScoreCol]) || 0;
  const aoScore = parseFloat(row[aoScoreCol]) || 0;

  const vColPatterns = ['1. que vous souhaitez changer pose', '2. que vous souhaitez changer pose', '3. actuelle pourrait', '4. que vous souhaitez changer pose', '5. que vous souhaitez changer pose'];
  const aoColPatterns = ['1. votre organisation est-elle aux prises', '2. le temps et', '3. disposez-vous du temps', '4. le changement introduit', '5. le financement requis', '6. estimez-vous que les solutions'];

  const vAnswerCols = vColPatterns.map(pat =>
    keys.find(k => normSearch(k).includes(pat) && normSearch(k).includes('vulnerabilite')) ||
    keys.find(k => normSearch(k).includes(pat)) || ''
  );
  const aoAnswerCols = aoColPatterns.map(pat =>
    keys.find(k => normSearch(k).includes(pat) && normSearch(k).includes('selectionnez')) ||
    keys.find(k => normSearch(k).includes(pat)) || ''
  );

  const vQuestions  = vAnswerCols.map((col, i) => textToVScore(row[col] || '', i));
  const aoQuestions = aoAnswerCols.map((col, i) => textToAOScore(row[col] || '', i));

  const prenomKey = keys.find(k => normSearch(k).includes('prenom')) || '';
  const nomKey = keys.find(k => normSearch(k) === 'nom') || '';
  const findKeyBy = (search) => keys.find(k => normSearch(k).includes(normSearch(search))) || '';

  return {
    prenom:  row[prenomKey] || '',
    nom:     row[nomKey] || '',
    name:    [row[prenomKey], row[nomKey]].filter(Boolean).join(' ') || 'Participant',
    email:   row[findKeyBy('e-mail')] || row[findKeyBy('email')] || '',
    dept:    row[findKeyBy('departement')] || '',
    pos:     row[findKeyBy('poste')] || '',
    company: row[findKeyBy('pharmacie')] || '',
    date:    row[findKeyBy("date de l'atelier")] || row[findKeyBy('date du workshop')] || '',
    responseId: row[findKeyBy('id de la reponse')] || '',
    vScore, aoScore,
    P: Math.round(vScore * aoScore),
    vQuestions, aoQuestions,
  };
}

// ── MAIN LOAD FUNCTION (with retry for Zoho sync delay) ───────────────────────
async function loadResults(attempt) {
  attempt = attempt || 1;
  const identity = getIdentity();

  if (!identity.prenom && !identity.nom && !identity.responseId) {
    showError('Aucun participant identifié');
    return;
  }

  showLoading();

  try {
    const text = await loadCSVText();
    const rows = parseCSV(text).filter(r => {
      return Object.entries(r).some(([k, v]) => {
        return (normSearch(k).includes('prenom') || normSearch(k) === 'nom') && String(v || '').trim();
      });
    });

    const row = findParticipant(rows, identity);

    if (!row) {
      if (attempt < 3) {
        setTimeout(() => loadResults(attempt + 1), 4000);
        return;
      }
      showError('Participant non trouvé dans les données');
      return;
    }

    const d = processRow(row);
    if (identity.dateAtelier) d.date = identity.dateAtelier;
    renderResults(d);

  } catch(e) {
    console.error('Erreur de chargement:', e);
    if (attempt < 3) {
      setTimeout(() => loadResults(attempt + 1), 4000);
      return;
    }
    showError('Erreur de chargement des données');
  }
}
